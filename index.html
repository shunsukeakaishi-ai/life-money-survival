<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生資産サバイバル（Phase 2.3）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="panel hero-panel">
      <h1>人生資産サバイバル</h1>
      <p class="subtitle">36ヶ月、生活を守りながら、純資産200万円へ。</p>
      <div id="milestoneMessage" class="milestone"></div>
    </header>

    <section class="panel event-focus-panel">
      <h2>最新イベント / 今月の出来事</h2>
      <article id="eventCard" class="event-card info"></article>
    </section>

    <section class="panel quick-status-panel">
      <h2>今月の判断用ステータス</h2>
      <div id="quickStatusBar" class="quick-status"></div>
    </section>

    <section class="panel action-panel">
      <h2>今月の行動選択</h2>
      <div class="investment-controls">
        <label for="investmentType">投資先：</label>
        <select id="investmentType">
          <option value="fund">投資信託（低リスク）</option>
          <option value="stock">個別株（中リスク）</option>
          <option value="crypto">仮想通貨（高リスク・13ヶ月目から）</option>
        </select>
      </div>
      <div class="buttons">
        <button data-action="work">本業に集中する</button>
        <button data-action="sidejob">副業を頑張る</button>
        <button data-action="rest">休養する</button>
        <button data-action="invest">投資を増やす</button>
        <button data-action="borrow">借金する</button>
        <button data-action="refresh">リフレッシュする</button>
        <button data-action="rebalance">生活を見直す</button>
      </div>
      <div class="secondary-buttons">
        <button id="sellBtn">売却する（全額）</button>
        <button id="restartBtn">リスタート</button>
      </div>
      <div id="refreshCooldown" class="cooldown-note"></div>
      <p id="message" class="message"></p>
    </section>

    <section class="panel summary-panel">
      <h2>月次サマリー</h2>
      <div id="monthlySummary">まだ行動していません。</div>
    </section>

    <section class="panel status-panel">
      <h2>詳細ステータス</h2>
      <div id="statusGrid" class="status-grid"></div>
      <div class="wealth-meter-wrap">
        <strong>資産メーター（目標200万円）</strong>
        <div class="wealth-meter"><div id="wealthFill" class="wealth-fill"></div></div>
      </div>
    </section>

    <section class="panel log-panel">
      <h2>イベントログ（新しい順）</h2>
      <ul id="eventLog"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
