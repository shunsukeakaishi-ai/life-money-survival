<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人生資産サバイバル（MVP）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>人生資産サバイバル（MVP）</h1>
    <p class="subtitle">36ヶ月、生き残りながら純資産100万円を目指せ。</p>

    <section class="panel status-panel">
      <h2>ステータス</h2>
      <div id="statusGrid" class="status-grid"></div>
    </section>

    <section class="panel action-panel">
      <h2>今月の行動</h2>
      <div class="investment-controls">
        <label for="investmentType">投資先：</label>
        <select id="investmentType">
          <option value="fund">投資信託（低リスク）</option>
          <option value="stock">個別株（中リスク）</option>
          <option value="crypto">仮想通貨（高リスク・13ヶ月目から）</option>
        </select>
      </div>

      <div class="buttons">
        <button data-action="work">普通に働く</button>
        <button data-action="sidejob">副業を頑張る</button>
        <button data-action="rest">休養する</button>
        <button data-action="invest">投資を増やす</button>
        <button data-action="borrow">借金する</button>
      </div>

      <div class="secondary-buttons">
        <button id="sellBtn">売却する（全額）</button>
        <button id="restartBtn">リスタート</button>
      </div>
      <p id="message" class="message"></p>
    </section>

    <section class="panel summary-panel">
      <h2>月次サマリー</h2>
      <div id="monthlySummary">まだ行動していません。</div>
    </section>

    <section class="panel log-panel">
      <h2>イベントログ（新しい順）</h2>
      <ul id="eventLog"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
